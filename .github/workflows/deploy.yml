name: Deploy auf IONOS

# Bei jedem Push auf main wird der Ordner site/ per FTPS/SFTP auf den IONOS-Webspace hochgeladen.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload auf IONOS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          protocol: ftps              # Action kann kein SFTP; IONOS nimmt dieselben Zugangsdaten per FTPS (Port 21)
          server: ${{ secrets.IONOS_SFTP_HOST }}
          username: ${{ secrets.IONOS_SFTP_USER }}
          password: ${{ secrets.IONOS_SFTP_PASS }}
          local-dir: ./site/          # nur der Website-Ordner wird hochgeladen
          # Zielordner; fehlender End-Slash wird automatisch ergänzt
          server-dir: ${{ endsWith(secrets.IONOS_SFTP_REMOTE, '/') && secrets.IONOS_SFTP_REMOTE || format('{0}/', secrets.IONOS_SFTP_REMOTE) }}
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/README.md
