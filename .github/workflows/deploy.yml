name: Deploy auf IONOS

# Bei jedem Push auf main wird der Ordner site/ per FTPS/SFTP auf den IONOS-Webspace hochgeladen.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload auf IONOS (SFTP)
        uses: wlixcc/SFTP-Deploy-Action@v1.2.5
        with:
          server: ${{ secrets.IONOS_SFTP_HOST }}     # IONOS SFTP-Host (home….1and1-data.host)
          username: ${{ secrets.IONOS_SFTP_USER }}
          password: ${{ secrets.IONOS_SFTP_PASS }}
          port: 22
          local_path: ./site/*
          remote_path: ${{ secrets.IONOS_SFTP_REMOTE }}
          # sftp_only entfernt: Action legt Zielordner per SSH an, falls er fehlt
