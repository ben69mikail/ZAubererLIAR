name: Fotos aus Wayback-Archiv holen

# Laeuft, wenn das Fetch-Script gepusht/geaendert wird, oder manuell.
on:
  push:
    paths:
      - 'scripts/fetch_fotos.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install paramiko
      - run: python scripts/fetch_fotos.py
        env:
          IONOS_SFTP_HOST: ${{ secrets.IONOS_SFTP_HOST }}
          IONOS_SFTP_USER: ${{ secrets.IONOS_SFTP_USER }}
          IONOS_SFTP_PASS: ${{ secrets.IONOS_SFTP_PASS }}
      - name: Commit Fotos
        run: |
          git config user.name "foto-bot"
          git config user.email "foto-bot@users.noreply.github.com"
          git add site/assets/img
          if git diff --staged --quiet; then
            echo "Keine neuen Fotos"
          else
            git commit -m "Original-Fotos aus Wayback-Archiv [skip ci]"
            git push
          fi
